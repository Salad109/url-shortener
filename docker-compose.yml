services:
  url-shortener-app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - BASE_URL=${BASE_URL:-http://dogshit:8080}
    depends_on:
      - redis

  redis:
    image: redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
    depends_on:
      - url-shortener-app
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_LOG_LEVEL=warn
    depends_on:
      - prometheus
    profiles:
      - monitoring

volumes:
  redis_data:
  grafana_data:
  prometheus_data:
